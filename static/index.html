<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="DB GlobalChip 심천지사 전도금 정산 자동화 시스템">
  <title>심천지사 전도금 정산 자동화 시스템</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <div class="toast-container" id="toastContainer"></div>

  <!-- ===== 헤더 ===== -->
  <header class="app-header">
    <div class="header-brand">
      <img src="/logo.png" alt="DB GlobalChip" class="header-logo" id="headerLogo">
      <div class="header-title-wrap">
        <h1 class="header-title">심천지사 전도금 정산 자동화 시스템</h1>
      </div>
    </div>

    <div class="header-center">
      <div class="month-select-wrap">
        <span class="month-icon">📅</span>
        <select id="monthSelect" class="month-select">
          <option value="">불러오는 중...</option>
        </select>
      </div>
    </div>

    <div class="header-right">
      <div class="stat-pills">
          <div class="stat-pill">
            <span class="pill-label">총</span>
            <span class="pill-value" id="valTotal">0</span>
            <span class="pill-unit">건</span>
          </div>
          <div class="stat-pill processed">
            <span class="pill-label">처리</span>
            <span class="pill-value" id="valProcessed">0</span>
            <span class="pill-unit">건</span>
          </div>
          <div class="stat-pill warning" id="statWarning">
            <span class="pill-label">확인필요</span>
            <span class="pill-value" id="valWarning">0</span>
            <span class="pill-unit">건</span>
          </div>
          <div class="stat-pill amount">
            <span class="pill-label">총액</span>
            <span class="pill-value" id="valAmount">¥0</span>
          </div>
        </div>
        <button class="btn-save-excel" id="btnSaveExcel">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          엑셀 최종 저장
      </button>
    </div>
  </header>

  <!-- ===== 탭 네비게이션 ===== -->
  <nav class="tab-nav">
    <button class="tab-btn" data-tab="table" id="tabTable">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
      정산 내역
    </button>
    <button class="tab-btn" data-tab="review" id="tabReview">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      데이터 검토
    </button>
    <div class="nav-copyright">
      Copyright &copy; 2026 Wookmini. All rights reserved.
    </div>
  </nav>

  <!-- ===== 메인 콘텐츠 ===== -->
  <main class="main-content">

    <!-- ===== 탭 1: 정산 내역 ===== -->
    <section class="tab-panel active" id="panelTable">
      <div class="glass-card table-card">
        <div class="card-header">
          <div class="card-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
            전체 정산 내역
          </div>
          <div class="table-controls">
            <input type="text" id="tableSearch" class="search-input" placeholder="🔍 내역, 담당자 검색...">
            <span class="record-count" id="recordCount">0건</span>
          </div>
        </div>
        <div class="data-table-wrapper">
          <table class="data-table" id="settlementTable">
            <thead>
              <tr>
                <th class="col-no">#</th>
                <th class="col-date sortable" data-col="withdrawal_date">출금일자 <span class="sort-icon">↕</span></th>
                <th class="col-date sortable" data-col="date">증빙일자 <span class="sort-icon">↕</span></th>
                <th class="col-no">증빙번호</th>
                <th class="col-desc">내역</th>
                <th class="col-person">담당자</th>
                <th class="col-major">대계정</th>
                <th class="col-minor">소계정</th>
                <th class="col-amount sortable" data-col="amount">금액(CNY) <span class="sort-icon">↕</span></th>
                <th class="col-type">유형</th>
                <th class="col-remark">시스템 판독 결과</th>
                <th class="col-action">편집</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
            <tfoot>
              <tr class="total-row">
                <td colspan="8" class="total-label">합 계</td>
                <td class="amount-cell" id="totalAmount">¥0.00</td>
                <td colspan="3"></td>
              </tr>
            </tfoot>
          </table>
        </div>
        <div class="empty-state" id="tableEmpty">
          <div class="empty-icon">📋</div>
          <h3>정산 데이터가 없습니다</h3>
          <p>파이썬 배치 실행 후 월을 선택하면 데이터가 표시됩니다.</p>
        </div>
      </div>
    </section>

    <!-- ===== 탭 2: 데이터 검토 ===== -->
    <section class="tab-panel" id="panelReview">
      <div class="review-layout">

        <!-- 좌: 스크롤 가능한 썸네일 사이드바 -->
        <aside class="review-sidebar glass-card">
          <div class="sidebar-header">
            <span class="sidebar-title">영수증 목록</span>
            <span class="sidebar-count" id="sidebarCount">0건</span>
          </div>
          <div class="sidebar-list" id="sidebarList"></div>
        </aside>

        <!-- 우: 뷰어 + 폼 -->
        <div class="review-main">
          <div class="review-nav-bar">
            <button class="nav-btn" id="btnPrev">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
              이전
            </button>
            <span class="nav-counter" id="navCounter">0 / 0</span>
            <button class="nav-btn" id="btnNext">
              다음
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>

          <div class="split-layout">
            <!-- 이미지 뷰어 -->
            <div class="glass-card viewer-card">
              <div class="card-header">
                <div class="card-title">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                  영수증 원본
                </div>
                <div class="viewer-controls">
                  <button id="btnZoomIn" class="viewer-btn" title="확대">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                  </button>
                  <button id="btnZoomOut" class="viewer-btn" title="축소">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                  </button>
                  <button id="btnRotate" class="viewer-btn" title="회전">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                  </button>
                  <button id="btnReset" class="viewer-btn" title="초기화">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                  </button>
                </div>
              </div>
              <div class="image-viewer" id="imageViewer">
                <img id="reviewImage" src="" alt="영수증 이미지">
              </div>
              <div class="receipt-badge-row">
                <span class="badge-type" id="badgeType">—</span>
                <span class="badge-no" id="badgeNo">증빙 #—</span>
                <span class="badge-amount" id="badgeAmount">—</span>
              </div>
            </div>

            <!-- 편집 폼 -->
            <div class="glass-card form-card">
              <div class="card-header">
                <div class="card-title">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                  OCR 추출 결과 편집
                </div>
                <div class="mapped-badge" id="mappedBadge"></div>
              </div>

              <form class="edit-form" id="editForm">
                <div class="form-grid">
                  <div class="form-group">
                    <label for="editWithdrawalDate">📅 출금일자</label>
                    <input type="date" id="editWithdrawalDate">
                  </div>

                  <div class="form-group">
                    <label for="editDate">📅 증빙일자</label>
                    <input type="date" id="editDate">
                  </div>

                  <div class="form-group">
                    <label for="editReceiptNumber">🧾 증빙번호</label>
                    <input type="text" id="editReceiptNumber" placeholder="증빙번호(FULL)">
                  </div>

                  <div class="form-group">
                    <label for="editPerson">👤 담당자</label>
                    <select id="editPerson">
                      <option value="">— 선택 —</option>
                    </select>
                  </div>

                  <div class="form-group full-width">
                    <label for="editDescription">📝 내역</label>
                    <input type="text" id="editDescription" placeholder="내역을 입력하세요">
                  </div>

                  <div class="form-group">
                    <label for="editMajor">🏷️ 대계정</label>
                    <select id="editMajor">
                      <option value="">— 선택 —</option>
                      <option value="업무추진비">업무추진비</option>
                      <option value="여비교통비">여비교통비</option>
                      <option value="지급임차료">지급임차료</option>
                      <option value="통신비">통신비</option>
                      <option value="해외지사비">해외지사비</option>
                      <option value="급여">급여</option>
                      <option value="잡이익">잡이익</option>
                    </select>
                  </div>

                  <div class="form-group">
                    <label for="editMinor">🏷️ 소계정</label>
                    <select id="editMinor">
                      <option value="">— 선택 —</option>
                    </select>
                  </div>

                  <div class="form-group">
                    <label for="editAmount">💰 금액 (CNY)</label>
                    <input type="number" id="editAmount" step="0.01" placeholder="0.00">
                  </div>

                  <div class="form-group">
                    <label for="editType">🏷️ 영수증 유형</label>
                    <select id="editType">
                      <option value="增值税发票">增值税发票 (VAT Fapiao)</option>
                      <option value="火车票">火车票 (기차표)</option>
                      <option value="行程单">行程单 (항공권)</option>
                      <option value="出租车票">出租车票 (택시)</option>
                      <option value="加油票">加油票 (주유)</option>
                      <option value="过路费">过路费 (톨비)</option>
                      <option value="银行回单">银行回单 (은행)</option>
                      <option value="餐饮票">餐饮票 (식대)</option>
                      <option value="普通收据">普通收据 (일반 영수증)</option>
                      <option value="기타">기타</option>
                    </select>
                  </div>
                </div>

                <div class="form-group full-width">
                  <label for="editRemark">📌 비고</label>
                  <textarea id="editRemark" rows="2" placeholder="비고 내용을 입력하세요 (엑셀 비고 열에 반영됩니다)"></textarea>
                </div>

                <div class="form-group full-width" style="margin-top: 1rem;">
                  <label>🤖 자동화 시스템 판독 결과</label>
                  <div id="systemValidationResult" class="system-remark-box" style="padding: 10px; background-color: #f9f9f9; border: 1px solid #e5e7eb; border-radius: 6px; font-size: 13.5px; color: #4b5563; min-height: 40px; display: flex; align-items: center;">특이사항 없음</div>
                </div>

                <div class="form-actions">
                  <button type="button" class="btn-primary" id="btnSaveReceipt">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    저장
                  </button>
                  <button type="button" class="btn-danger" id="btnDeleteReceipt">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                    삭제
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <script src="/app.js"></script>
</body>
</html>
